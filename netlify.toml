# Netlify deploy config for cablegoal.com
# Static site is the repo root (index.html); serverless vote counter lives in netlify/functions.
[build]
  publish = "."
  functions = "netlify/functions"

# Friendly cache for the single HTML app; the vote function sets its own no-store headers.
[[headers]]
  for = "/index.html"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"
